<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interview Room</title>
    <link rel="stylesheet" href="mirror.css?v=4">
</head>
<body>
    <div id="scene-root"></div>

    <div id="precedent-popup">
        <span>Precedent Study-Cleaning Emotional Data</span>
    </div>

    <button id="folder-close" aria-label="Close">&times;</button>

    <div id="tab-tooltip"></div>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <div class="quiz-header">
                <span class="quiz-heading" id="quiz-heading"></span>
            </div>
            <div class="quiz-body">
                <p class="quiz-question" id="quiz-question"></p>

                <div class="quiz-input-area" id="quiz-input-area"></div>

                <div class="quiz-insight" id="quiz-insight" hidden>
                    <p class="quiz-label">Interesting points! Here is what I saw:</p>
                    <p id="quiz-insight-text"></p>
                </div>

                <div class="quiz-summary" id="quiz-summary" hidden>
                    <p class="quiz-label">This is my new understanding of the question. Thanks for providing some useful data!</p>
                    <p class="quiz-generated" id="quiz-summary-text"></p>
                    <button class="quiz-btn" id="quiz-next-btn"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="content-overlay">
        <div class="content-card">
            <div class="content-carousel">
                <div class="carousel-track" id="carousel-track"></div>
                <button class="carousel-btn carousel-prev" id="carousel-prev" aria-label="Previous image">&#8249;</button>
                <button class="carousel-btn carousel-next" id="carousel-next" aria-label="Next image">&#8250;</button>
                <div class="carousel-dots" id="carousel-dots"></div>
            </div>
            <div class="content-body">
                <h2 class="content-heading" id="content-heading"></h2>
                <div id="content-paragraphs"></div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="mirror.js?v=18"></script>
</body>
</html>
